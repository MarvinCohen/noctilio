    # --- Übersetzte Titel + Beschreibungen jedes Artikels (Schlüssel = Slug) ---
    # (auf FR kommen diese Werte aus dem Controller; hier werden sie übersetzt)
    articles:
      histoires-du-soir-enfant:
        title: "5 Ideen für Gutenachtgeschichten, damit dein Kind leicht einschläft"
        description: "Entdecke 5 Arten von Gutenachtgeschichten, die Kindern beim ruhigen Einschlafen helfen. Praktische Tipps und KI-personalisierte Beispiele."
        faqs:
          - question: "Welche Geschichte eignet sich am besten, um ein 3-jähriges Kind einzuschläfern?"
            answer: "Kurze Geschichten (3 bis 5 Minuten) mit einem beruhigenden Helden, der nach Hause kommt und einschläft, sind für 3-Jährige am wirksamsten. Themen rund um die Nacht, die Sterne und vertraute Tiere beruhigen das Kind beim Übergang vom Wachsein zum Schlaf ganz natürlich."
          - question: "Wie macht man eine Gutenachtgeschichte wirksamer?"
            answer: "Die Wirksamkeit einer Gutenachtgeschichte beruht auf drei Elementen: einem langsamen Tempo und einer sanften Stimme, einem Helden, mit dem sich das Kind identifiziert (idealerweise mit seinem eigenen Namen), und einem beruhigenden Ende, in dem die Figur einschläft. Dasselbe Ritual jeden Abend zu wiederholen verstärkt den Schlaf-Signal-Effekt."
          - question: "Ab welchem Alter kann man Gutenachtgeschichten erzählen?"
            answer: "Gutenachtgeschichten können schon ab 18 Monaten mit sehr einfachen Geschichten beginnen (2-3 Minuten, eine Figur, ein einziges Ereignis). Ab 3 Jahren folgt das Kind einer vollständigen Erzählung mit Anfang, Wendepunkt und Ende. Der interaktive Modus (Entscheidungen innerhalb der Geschichte) eignet sich ab 4-5 Jahren."
      conte-personnalise-ia-enfant:
        title: "Wie die KI personalisierte Märchen für dein Kind erstellt"
        description: "Verstehe, wie GPT-4o einzigartige Geschichten passend zu Alter, Vorlieben und Persönlichkeit jedes Kindes erschafft. Ein Leitfaden für Eltern."
        faqs:
          - question: "Sind die von der KI erstellten Geschichten dem Alter des Kindes angepasst?"
            answer: "Ja. Noctilio passt Wortschatz, erzählerische Komplexität und Länge automatisch an das im Kinderprofil angegebene Alter an. Ein 3-jähriges Kind erhält eine kurze Geschichte mit einfachen Wörtern, während ein 8-jähriges Kind eine längere Geschichte mit Wendungen bekommt."
          - question: "Kann die KI den Namen meines Kindes in die Geschichte einbauen?"
            answer: "Absolut. Das ist sogar die zentrale Funktion von Noctilio: Der Held jeder Geschichte trägt den Namen deines Kindes. Die KI bezieht außerdem seine Lieblingsfiguren, seine Lieblingswelt (Weltraum, Dinosaurier, Prinzessinnen, Piraten, Tiere) und seine Persönlichkeitsmerkmale mit ein, um eine einzigartige Geschichte zu erschaffen."
          - question: "Sind die von der KI erstellten Geschichten sicher für Kinder?"
            answer: "Ja. GPT-4o ist mit strengen Anweisungen konfiguriert, um nur positive, liebevolle und für Kinder von 2 bis 10 Jahren geeignete Inhalte zu erzeugen. Die Geschichten vermeiden jede Gewalt, übermäßige Angst oder unangemessene Inhalte. Jede Erzeugung respektiert die von den Eltern gewählten erzieherischen Werte."
      histoires-enfant-4-ans:
        title: "Geschichten für 4-Jährige: was sie wirklich fesselt"
        description: "Welche Geschichten passen am besten zu 4-Jährigen? Länge, Figuren, Erzählstruktur: alles, was du wissen musst."
      histoires-enfant-3-ans:
        title: "Geschichten für 3-Jährige: das Abendritual, das beruhigt"
        description: "Mit 3 Jahren ist die Gutenachtgeschichte ein wichtiges Übergangsritual. Entdecke die ideale Länge, beruhigende Welten und den Umgang mit der Angst vor der Dunkelheit."
      histoires-enfant-5-ans:
        title: "Geschichten für 5-Jährige: die Welten, die wirklich fesseln"
        description: "Mit 5 Jahren explodiert die Fantasie. Welche Geschichten funktionieren am besten? Erzählstruktur, komplexe Gefühle, interaktiver Modus: ein kompletter Leitfaden."
      histoire-personnalisee-prenom-enfant:
        title: "Eine personalisierte Geschichte mit dem Namen deines Kindes: warum das alles verändert"
        description: "Den eigenen Namen in einer Geschichte zu hören weckt Aufmerksamkeit und Gedächtnis des Kindes. Verstehe die Kraft der Personalisierung und wie die KI noch weiter geht."
      conte-interactif-enfant:
        title: "Interaktive Geschichten für Kinder: wenn dein Kind entscheidet, wie es weitergeht"
        description: "Interaktives Erzählen macht aus Zuhören Mitmachen. Ab 4 Jahren wird dein Kind zum Mitautor seiner Gutenachtgeschichte. Vorteile und Funktionsweise."
      histoire-courte-enfant-soir:
        title: "Kurze Geschichten für Kinder: 5 Minuten für ein gelungenes Abendritual"
        description: "Eine gut gemachte kurze Geschichte ist zum Einschlafen oft wirksamer als eine lange. Struktur, Themen und Tipps für schnelle Abende."
