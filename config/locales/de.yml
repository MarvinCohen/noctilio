    faq_a1: "Der Essentiel-Tarif kostet 4,99 €/Monat und Premium 9,99 €/Monat, automatisch jeden Monat am Jahrestag deiner Anmeldung abgebucht. Die Zahlung wird von Stripe abgewickelt — wir speichern niemals deine Bankdaten."
    faq_q2: "Kann ich jederzeit kündigen?"
    faq_a2: "Ja, mit einem Klick auf dieser Seite, ohne Begründung oder Gebühren. Dein Zugang bleibt bis zum Ende des bereits bezahlten Zeitraums aktiv, danach kehrt dein Konto automatisch zum kostenlosen Tarif zurück."
    faq_q3: "Was passiert mit meinen Geschichten, wenn ich kündige?"
    faq_a3: "Alle deine Geschichten bleiben in deiner Bibliothek und lesbar, einschließlich der bereits erstellten interaktiven Geschichten. Nur neue Kreationen kehren zu den Grenzen des kostenlosen Tarifs zurück."
    faq_q4: "Welche Zahlungsmethoden akzeptiert ihr?"
    faq_a4: "Alle Bankkarten (Visa, Mastercard, American Express) über Stripe, dieselbe sichere Zahlungsplattform, die von Millionen Websites weltweit genutzt wird."
