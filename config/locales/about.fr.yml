fr:
  about:
    meta_title: "À propos : Marvin Cohen, fondateur de Noctilio"
    meta_description: "Marvin Cohen, développeur et papa, a créé Noctilio pour offrir chaque soir une histoire unique à son enfant. Découvrez l'histoire du projet, la technologie et les valeurs derrière Noctilio."
    schema_job_title: "Fondateur de Noctilio"
    schema_description: "Développeur Rails et papa, créateur de Noctilio, application de génération d'histoires personnalisées pour enfants par IA."

    header_title: "À propos"
    header_subtitle: "Marvin Cohen, Fondateur de Noctilio"

    who_title: "Qui je suis"
    who_p1: "Je m'appelle Marvin Cohen. Je suis développeur web, formé au Wagon Bordeaux, et papa. C'est d'ailleurs cette deuxième casquette qui m'a poussé à créer Noctilio."
    who_p2_html: "Comme beaucoup de parents, j'ai vécu ces soirs où l'on cherche l'histoire parfaite, assez captivante pour que l'enfant s'endorme le sourire aux lèvres, assez douce pour ne pas l'exciter davantage. J'avais envie de quelque chose de personnalisé, avec le prénom de mon enfant, ses personnages préférés, un univers qui lui ressemble. Les livres du commerce font très bien leur travail, mais ils ne connaissent pas <em>votre</em> enfant."

    why_title: "Pourquoi j'ai créé Noctilio"
    why_p1: "L'idée est née simplement : et si l'IA pouvait générer, chaque soir, une histoire unique centrée sur ton enfant ? Avec son prénom comme héros, ses centres d'intérêt comme toile de fond, et une fin apaisante qui l'aide à glisser vers le sommeil."
    why_p2: "J'ai commencé à développer Noctilio en solo début 2026, comme premier projet Rails post-formation. Ce que je voulais construire : un outil que j'aurais aimé avoir en tant que parent, simple, rapide, beau, et sûr pour les enfants."
    why_p3_html: "Le nom vient du latin <em>nox</em> (nuit) et du hibou, animal emblématique des histoires du soir, gardien des rêves dans les mythologies du monde entier."

    tech_title: "La technologie derrière Noctilio"
    tech_intro: "Noctilio est construit avec :"
    tech_rails_html: "<strong>Ruby on Rails 8</strong> : framework web robuste, idéal pour un projet solo grâce à ses conventions et son écosystème mature."
    tech_gpt_html: "<strong>Llama 3.3 70B (via Groq)</strong> : génère le texte de chaque histoire. Le modèle est configuré avec des instructions strictes pour produire uniquement du contenu positif, bienveillant et adapté aux enfants de 2 à 10 ans."
    tech_image_html: "<strong>gpt-image-1 (OpenAI)</strong> : crée une illustration unique pour chaque histoire, dans le style choisi (Ghibli, Pixar, aquarelle…)."
    tech_db_html: "<strong>PostgreSQL + ActiveStorage</strong> : stocke les histoires et les images générées de façon sécurisée."
    tech_privacy: "Les histoires ne sont pas stockées côté OpenAI après génération. Chaque appel est indépendant, aucune donnée personnelle de vos enfants n'est conservée par les modèles d'IA."

    values_title: "Ce qui compte pour moi"
    values_safety_html: "<strong>Sécurité avant tout.</strong> Chaque histoire est générée avec des garde-fous stricts : pas de violence, pas de peur excessive, aucun contenu inapproprié. Les parents restent maîtres des valeurs transmises."
    values_transparency_html: "<strong>Transparence.</strong> Noctilio est un projet indépendant, sans investisseurs, sans dark patterns. Ce que vous voyez est ce que vous avez."
    values_privacy_html: "<strong>Respect de la vie privée.</strong> Les prénoms et données des enfants ne sont jamais revendus ni utilisés à d'autres fins que la génération des histoires."
    values_improvement_html: "<strong>Amélioration continue.</strong> Noctilio est en développement actif. Les retours des parents guident les prochaines fonctionnalités."

    contact_title: "Me contacter"
    contact_p1: "Tu as une question, une suggestion, ou tu veux simplement raconter comment Noctilio a changé ton rituel du soir ?"
    contact_p2_html: "Écris-moi à <strong>marvincohen95@gmail.com</strong> ou retrouve Noctilio sur les réseaux :"
    contact_response: "Je lis tous les messages. J'essaie de répondre dans les 48 h."

    cta_logged_in: "Créer une histoire"
    cta_logged_out: "Essayer Noctilio gratuitement"
