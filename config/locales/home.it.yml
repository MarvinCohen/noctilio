      title: "Come funziona?"
      step1_title: "Crea il profilo del tuo eroe"
      step1_desc: "Inserisci il nome del tuo bambino, la sua età, i suoi personaggi preferiti e il mondo che sceglie: foresta incantata, spazio, dinosauri, pirati o animali. Puoi anche descrivere liberamente il mondo della tua immaginazione. Noctilio lo ricorda per tutte le storie successive."
