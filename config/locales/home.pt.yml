      step2_desc: "Em segundos, a nossa inteligência artificial (Llama 3.3) gera um conto inédito, adaptado à idade do teu filho e ao seu nível de leitura. Cada história vem com uma ilustração criada especialmente para a ocasião. Nunca há duas iguais."
      step3_title: "Lê ou ouve à hora de dormir"
      step3_desc: "Ponham-se confortáveis. A história está pronta para ser lida em conjunto ou ouvida em voz alta. No modo interativo, o teu filho escolhe ele próprio a continuação da aventura a cada passo, como num verdadeiro livro de que é o herói."
      closing_html: "<strong>Noctilio</strong> foi pensada para os pais que querem oferecer aos filhos momentos de leitura ricos e personalizados, sem passar horas nisso. Cada história é adaptada à criança, ao seu nome, à sua idade e à sua personalidade, e renovada a cada geração. <strong>3 histórias por semana gratuitamente</strong>, e histórias ilimitadas com o modo interativo na subscrição Premium."
