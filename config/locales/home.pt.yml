      title: "Como funciona?"
      step1_title: "Cria o perfil do teu herói"
      step1_desc: "Indica o nome do teu filho, a sua idade, as suas personagens favoritas e o mundo que escolher: floresta encantada, espaço, dinossauros, piratas ou animais. Também podes descrever livremente o mundo da tua imaginação. A Noctilio recorda-o para todas as histórias seguintes."
