fr:
  devise:
    confirmations:
      send_instructions: "Vous allez recevoir un email avec les instructions de confirmation dans quelques minutes."
      send_paranoid_instructions: "Si votre adresse email existe dans notre base, vous recevrez un email avec les instructions de confirmation dans quelques minutes."
      confirmed: "Votre compte a bien été confirmé. Vous êtes maintenant connecté."
    registrations:
      destroyed: "Votre compte a bien été supprimé. À bientôt peut-être ✦"
      updated: "Votre compte a bien été mis à jour."
      updated_but_not_signed_in: "Votre compte a bien été mis à jour, mais comme votre mot de passe a changé, vous devez vous reconnecter."
      signed_up: "Bienvenue ! Votre compte a été créé avec succès."
      signed_up_but_inactive: "Votre compte a bien été créé. Cependant, nous n'avons pas pu vous connecter car il n'est pas encore activé."
      signed_up_but_locked: "Votre compte a bien été créé, mais il est verrouillé : nous n'avons pas pu vous connecter."
      signed_up_but_unconfirmed: "Un email avec un lien de confirmation a été envoyé à votre adresse. Suivez ce lien pour confirmer votre compte."
      update_needs_confirmation: "Votre compte a bien été mis à jour, mais nous devons vérifier votre nouvelle adresse email. Consultez votre boîte mail et suivez le lien de confirmation."
    sessions:
      signed_in: "Connexion réussie."
      signed_out: "Vous avez été déconnecté."
      already_signed_out: "Vous avez été déconnecté."
    passwords:
      send_instructions: "Vous recevrez un email avec les instructions de réinitialisation dans quelques minutes."
      send_paranoid_instructions: "Si votre adresse email existe dans notre base, vous recevrez un lien de réinitialisation par email dans quelques minutes."
      updated: "Votre mot de passe a bien été modifié. Vous êtes maintenant connecté."
      updated_not_active: "Votre mot de passe a bien été modifié."
      no_token: "Vous ne pouvez pas accéder à cette page sans passer par un email de réinitialisation de mot de passe. Si vous venez bien d'un tel email, vérifiez que vous avez utilisé l'URL complète fournie."
    unlocks:
      send_instructions: "Vous recevrez un email avec les instructions pour déverrouiller votre compte dans quelques minutes."
      send_paranoid_instructions: "Si votre compte existe, vous recevrez un email avec les instructions pour le déverrouiller dans quelques minutes."
      unlocked: "Votre compte a bien été déverrouillé. Connectez-vous pour continuer."
    # Sujets des emails transactionnels envoyés par Devise (mailer)
    mailer:
      confirmation_instructions:
        subject: "Confirme ton adresse email ✦"
      reset_password_instructions:
        subject: "Réinitialise ton mot de passe"
      unlock_instructions:
        subject: "Débloque ton compte Noctilio"
      email_changed:
        subject: "Ton adresse email a été modifiée"
      password_change:
        subject: "Ton mot de passe a été modifié"
    # Messages pour la connexion via OAuth (Google, etc.)
    omniauth_callbacks:
      # %{kind} est remplacé par "Google"
      success: "Connecté avec succès via %{kind}."
      failure: "Impossible de vous connecter via %{kind} : %{reason}"
    failure:
      already_authenticated: "Vous êtes déjà connecté."
      inactive: "Votre compte n'est pas encore activé."
      invalid: "Email ou mot de passe incorrect."
      not_found_in_database: "Email ou mot de passe incorrect."
      # Affiché quand le compte est verrouillé (10 échecs de connexion atteints)
      locked: "Votre compte est verrouillé. Consultez votre email pour le déverrouiller."
      # Avertissement à l'avant-dernier essai (config.last_attempt_warning)
      last_attempt: "Il vous reste une tentative avant que votre compte ne soit verrouillé."
      timeout: "Votre session a expiré. Veuillez vous reconnecter pour continuer."
      unauthenticated: "Vous devez vous connecter pour continuer."
      unconfirmed: "Vous devez confirmer votre adresse email avant de continuer."
  errors:
    messages:
      already_confirmed: "a déjà été confirmé, veuillez essayer de vous connecter"
      confirmation_period_expired: "doit être confirmé sous %{period}, veuillez en demander un nouveau"
      expired: "a expiré, veuillez en demander un nouveau"
      not_found: "introuvable"
      not_locked: "n'était pas verrouillé"
      not_saved:
        one: "1 erreur a empêché l'enregistrement de ce %{resource} :"
        other: "%{count} erreurs ont empêché l'enregistrement de ce %{resource} :"
