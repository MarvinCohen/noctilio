#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Rappel "histoire du soir" — tous les jours à 19h30 (fuseau Europe/Paris).
  # Le fuseau est précisé en fin d'expression cron pour ne pas dépendre de l'heure
  # serveur (Railway tourne en UTC). Le job filtre lui-même les destinataires
  # (abonnés push sans histoire créée depuis 3 jours).
  evening_story_reminder:
    class: EveningStoryReminderJob
    schedule: "30 19 * * * Europe/Paris"

  # Relance des comptes inactifs — tous les jours à 10h00 (fuseau Europe/Paris).
  # Le job cible lui-même les comptes créés il y a exactement 7 puis 30 jours et
  # n'ayant créé aucune histoire (relance J+7 puis J+30, une seule fois chacune).
  inactive_user_reminder:
    class: InactiveUserReminderJob
    schedule: "0 10 * * * Europe/Paris"
