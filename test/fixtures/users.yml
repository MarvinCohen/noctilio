# Fixtures pour les utilisateurs
# Les mots de passe Devise sont stockés chiffrés.
# La valeur ci-dessous est un hash BCrypt pré-calculé pour le mot de passe "password".
# On utilise une valeur fixe en dur pour éviter les problèmes de chargement de BCrypt
# dans le contexte ERB des fixtures Rails (BCrypt n'est pas disponible dans ce contexte).
# Pour la regénérer : bundle exec rails runner "require 'bcrypt'; puts BCrypt::Password.create('password')"
# Hash correspondant au mot de passe : "password"
#
# confirmed_at : depuis l'ajout du module :confirmable, un compte non confirmé
# est bloqué après la période de grâce. On marque donc les comptes de test comme
# confirmés (date dans le passé) pour qu'ils puissent se connecter sans souci.

# Utilisateur standard — pas admin, pas premium
marie:
  email: marie@example.com
  encrypted_password: $2a$12$R9qMzelufW5/.1.7qayyxuusBb8g51LB08a8ZkU2XsjZXmZUSpnim
  first_name: Marie
  last_name: Dupont
  admin: false
  confirmed_at: <%= 1.month.ago.to_fs(:db) %>

# Deuxième utilisateur — pour tester les autorisations croisées
# (ex. : Marie ne doit pas voir les histoires de Paul)
paul:
  email: paul@example.com
  encrypted_password: $2a$12$R9qMzelufW5/.1.7qayyxuusBb8g51LB08a8ZkU2XsjZXmZUSpnim
  first_name: Paul
  last_name: Martin
  admin: false
  confirmed_at: <%= 1.month.ago.to_fs(:db) %>

# Utilisateur admin — premium? retourne true automatiquement
admin_user:
  email: admin@example.com
  encrypted_password: $2a$12$R9qMzelufW5/.1.7qayyxuusBb8g51LB08a8ZkU2XsjZXmZUSpnim
  first_name: Admin
  last_name: Noctilio
  admin: true
  confirmed_at: <%= 1.month.ago.to_fs(:db) %>
