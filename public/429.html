<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Noctilio — Trop de tentatives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }

    body {
      background: #0f1021;
      color: #d4cfc4;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Canvas étoiles — couvre toute la page, fixe derrière tout le contenu */
    #stars-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
    }

    /* Logo Noctilio en haut */
    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(240,201,122,0.5);
      margin-bottom: 3rem;
      text-decoration: none;
      display: block;
    }

    /* Grand code erreur en filigrane — discret, en arrière-plan visuel */
    .error-code {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(240,201,122,0.12);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    /* Wrapper pour positionner la mascotte à cheval sur la barre */
    .divider-wrap {
      position: relative;
      margin: 2rem auto 2rem;
      /* Hauteur = hauteur de la mascotte, la barre est au fond */
      height: 120px;
      width: 100%;
    }

    /* Mascotte centrée horizontalement, pattes par-dessus la barre */
    /* z-index: 2 garantit que la mascotte passe au-dessus de la barre dorée */
    .owl {
      display: block;
      position: absolute;
      bottom: -3px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    /* La barre passe derrière la mascotte */
    .divider {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(240,201,122,0.4), transparent);
      z-index: 1;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 300;
      font-style: italic;
      color: #f0c97a;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.92rem;
      color: rgba(212,207,196,0.6);
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    /* Bouton retour — même style que la 404 */
    .btn {
      display: inline-block;
      background: transparent;
      border: 1px solid rgba(240,201,122,0.3);
      color: rgba(240,201,122,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.7rem 2rem;
      border-radius: 30px;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: rgba(240,201,122,0.6);
      color: #f0c97a;
    }
  </style>
</head>
<body>

  <!-- Canvas étoiles — même animation que le dashboard -->
  <canvas id="stars-canvas" aria-hidden="true"></canvas>

  <div class="container">
    <a href="/" class="logo">✦ Noctilio</a>

    <div class="error-code">429</div>

    <!-- Barre dorée avec la mascotte posée dessus — pattes sur la ligne -->
    <div class="divider-wrap">
      <img src="mascot.svg" alt="Noctilio" class="owl" width="120" height="120">
      <div class="divider"></div>
    </div>

    <h1>Le hibou a besoin d'un moment...</h1>
    <p>
      Tu as fait trop de tentatives en peu de temps.<br>
      Patiente quelques instants, puis réessaie.
    </p>

    <a href="/" class="btn">← Retour à l'accueil</a>
  </div>

  <script>
    // Étoiles scintillantes — copie exacte du canvas du dashboard
    // 250 étoiles dorées (rgba 240,201,122) avec scintillement sinusoïdal
    (function() {
      const canvas = document.getElementById('stars-canvas');
      const ctx    = canvas.getContext('2d');
      let stars    = [];

      function resizeStars() {
        const dpr     = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
      }

      function createStars() {
        const dpr = window.devicePixelRatio || 1;
        stars = [];
        for (let i = 0; i < 250; i++) {
          stars.push({
            x:     Math.random() * canvas.width,
            y:     Math.random() * canvas.height,
            r:     (Math.random() * 1.3 + 0.6) * dpr,
            speed: Math.random() * 0.004 + 0.001,
            phase: Math.random() * Math.PI * 2
          });
        }
      }

      function drawStars(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(function(s) {
          const alpha = 0.2 + 0.5 * Math.sin(s.phase + t * s.speed);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(240, 201, 122, ' + alpha + ')';
          ctx.fill();
        });
        requestAnimationFrame(drawStars);
      }

      resizeStars();
      createStars();
      requestAnimationFrame(drawStars);

      // Recalcule si la fenêtre change de taille
      let lastW = window.innerWidth, rTimer;
      window.addEventListener('resize', function() {
        clearTimeout(rTimer);
        rTimer = setTimeout(function() {
          if (Math.abs(window.innerWidth - lastW) > 10) {
            lastW = window.innerWidth;
            resizeStars();
            createStars();
          }
        }, 250);
      });
    })();
  </script>

</body>
</html>
